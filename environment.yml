name: ViOTUcluster
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - pip
  - biopython>=1.79
  - pandas>=1.3
  - numpy
  - packaging
  - fastp
  - megahit
  - spades
  - viralverify
  - virsorter=2.2.4
  - genomad
  - checkv
  - drep
  - vrhyme
  - bwa
  - sambamba
  - coverm
  - blast
  - parallel
  - pip:
      - --no-deps
      - .
